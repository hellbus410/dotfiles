# ~/.tmux.conf
# Rendering/capacity
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on

# Required for yazi (and anything else using terminal-capability queries,
# e.g. image preview) to work inside tmux at all — without this, tmux
# swallows the terminal's response to yazi's startup handshake, which is
# exactly the "screen stays blank, q still quits" symptom: yazi is running,
# it just never got confirmation the terminal understood its queries.
# https://yazi-rs.github.io/docs/image-preview#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Status bar: black/cyan, top.
set -g status-position top
set -g status-style 'bg=black,fg=cyan'
set -g status-left '#[bold]#S '
set -g status-left-length 20
# #{prefix_highlight}: blank unless prefix is currently held, from the
# tmux-prefix-highlight plugin below.
set -g status-right '#{prefix_highlight}%Y-%m-%d %H:%M '
set -g window-status-current-style 'bold'
set -g window-status-separator ' │ '
# Active window rendered as an inverted "pill" instead of just bold.
set -g window-status-current-format '#[fg=black,bg=cyan] #I:#W #[default]'

# Flag a window in the list when something happens in it in the background
# (e.g. a build finishes in `main` while you're working in `claude`).
setw -g monitor-activity on
set -g visual-activity on

# Pane borders: same black/cyan language as the status bar.
set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=cyan'

# --- Plugins (TPM: https://github.com/tmux-plugins/tpm) ---
# Note: TPM itself binds prefix+I / prefix+U / prefix+alt+u for plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Same inverted black-on-cyan look as the active-window pill, so the prefix
# indicator (referenced via #{prefix_highlight} in status-right above)
# reads as one consistent visual language.
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'cyan'

# resurrect: what a save/restore actually captures (session/window/pane
# layout, working directories, and pane text via a snapshot — not literal
# running-process state, that can't survive a reboot regardless of tool).
# Also note: resurrect's own default keybinds are prefix+Ctrl-s (save) and
# prefix+Ctrl-r (restore) — not something this config adds, just flagging
# since continuum below makes manual save/restore mostly unnecessary.
set -g @resurrect-capture-pane-contents 'on'

# continuum: autosave every N minutes, and restore automatically the moment
# the tmux server next starts (e.g. when niri's terminal keybind spawns the
# first `tmux new-session -A ...` after a reboot).
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this line at the very bottom of the file.
run -b '~/.tmux/plugins/tpm/tpm'
